<div class="flex justify-center items-center gap-2 py-4 border-t border-gray-50">
    {% if messages.has_prev %}
    <a href="?page={{ messages.prev_num }}"
       class="px-3 py-1 rounded-lg text-sm border border-gray-300 hover:bg-gray-50">‹ Anterior</a>
    {% endif %}
    <span class="text-sm text-gray-500">Página {{ messages.page }} de {{ messages.pages }}</span>
    {% if messages.has_next %}
    <a href="?page={{ messages.next_num }}"
       class="px-3 py-1 rounded-lg text-sm border border-gray-300 hover:bg-gray-50">Siguiente ›</a>
    {% endif %}
</div>
