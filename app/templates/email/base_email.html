<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceiba21</title>
</head>
<body style="margin:0; padding:0; background-color:#F9FAFB;
             font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
           style="background-color:#F9FAFB; padding:32px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                       style="max-width:560px; background-color:#FFFFFF; border-radius:14px;
                              overflow:hidden; border:1px solid #E5E7EB;">
                    <tr>
                        <td style="background-color:#1A1A1A; padding:20px 28px;">
                            <span style="font-size:20px; font-weight:800; color:#F7D917;">Ceiba21</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px 28px;">
                            {% block contenido %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:18px 28px; background-color:#F9FAFB; border-top:1px solid #E5E7EB;">
                            <p style="margin:0; font-size:12px; color:#9CA3AF;">
                                Ceiba21 · Cambio de divisas y servicios financieros<br>
                                <a href="https://ceiba21.com" style="color:#9CA3AF;">ceiba21.com</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
