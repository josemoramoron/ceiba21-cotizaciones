{% extends "base.html" %}
{% block title %}Chat - Ceiba21{% endblock %}

{% block extra_css %}
<style>
    .chat-wrap { display: grid; grid-template-columns: 320px 1fr; gap: 16px; height: calc(100vh - 200px); min-height: 460px; }
    .chat-col { background-color: var(--color-surface); border: 1px solid var(--color-border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
    .conv-list { overflow-y: auto; flex: 1; }
    .conv-item { display: block; width: 100%; text-align: left; padding: 12px 14px; border: none; cursor: pointer; background: none; border-bottom: 1px solid var(--color-border); color: var(--color-text); }
    .conv-item:hover { background-color: var(--color-bg); }
    .conv-item.active { background-color: var(--color-bg); border-left: 3px solid var(--color-primary); }
    .conv-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .conv-name { font-weight: 600; font-size: 0.88rem; }
    .conv-time { font-size: 0.7rem; color: var(--color-text-secondary); white-space: nowrap; }
    .conv-meta { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--color-text-secondary); margin-top: 3px; }
    .dot-sep { opacity: 0.5; }
    .bot-off { color: #B45309; }
    .bot-on { color: #047857; }
    .badge-unread { background-color: #DC2626; color: #FFF; border-radius: 999px; padding: 1px 7px; font-size: 0.68rem; font-weight: 700; }
    .thread { flex: 1; overflow-y: auto; padding: 16px; background-color: var(--color-bg); }
    .t-row { display: flex; margin-bottom: 10px; }
    .t-row--client { justify-content: flex-start; }
    .t-row--staff { justify-content: flex-end; }
    .t-bubble { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: 0.86rem; line-height: 1.35; white-space: pre-wrap; word-wrap: break-word; }
    .t-bubble--client { background-color: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); }
    .t-bubble--operator { background-color: var(--color-primary); color: #1A1A1A; }
    .t-bubble--bot { background-color: #DBEAFE; color: #1E3A8A; }
    .t-dots { display: flex; align-items: center; gap: 4px; padding: 10px 12px; }
    .t-dots span { width: 6px; height: 6px; border-radius: 50%; background-color: var(--color-text-secondary); animation: tDots 1.2s infinite ease-in-out; }
    .t-dots span:nth-child(2) { animation-delay: 0.15s; }
    .t-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes tDots { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
    .t-proof { display: block; margin-top: 6px; font-weight: 600; text-decoration: underline; }
    .t-proof-img { display: block; margin-top: 6px; max-width: 200px; border-radius: 8px; border: 1px solid var(--color-border); }
    .thread-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--color-border); }
    .reply-form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--color-border); }
    .reply-input { flex: 1; padding: 9px 12px; border-radius: 8px; font-size: 0.88rem; outline: none; background-color: var(--color-bg); color: var(--color-text); border: 1px solid var(--color-border); }
    .btn-c { border: none; cursor: pointer; padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 0.8rem; }
    .btn-primary-c { background-color: var(--color-primary); color: #1A1A1A; }
    .btn-warn-c { background-color: #F59E0B; color: #1A1A1A; }
    .btn-ok-c { background-color: #10B981; color: #FFF; }
    .btn-ghost-c { background-color: transparent; color: var(--color-text); border: 1px solid var(--color-border); }
    .empty-thread { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--color-text-secondary); font-size: 0.9rem; }
    @media (max-width: 900px) { .chat-wrap { grid-template-columns: 1fr; height: auto; } }
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4 flex-wrap gap-2">
    <h1 class="text-2xl font-bold" style="color: var(--color-text);">
        <i class="fas fa-comments mr-2"></i> Chat web
    </h1>
    <div class="flex items-center gap-3">
        <button id="btnEnablePush" type="button" class="btn-c btn-ghost-c" title="Recibir avisos de mensajes nuevos">
            <i class="fas fa-bell mr-1"></i> Activar avisos
        </button>
        <span id="globalState" class="text-sm" style="color: var(--color-text-secondary);"></span>
        <button id="btnGlobalPause" type="button" class="btn-c"
                data-paused="{{ 'true' if bot_paused_global else 'false' }}">
            Cargando...
        </button>
    </div>
</div>

<div class="chat-wrap">
    <div class="chat-col">
        <div style="padding: 12px 14px; border-bottom: 1px solid var(--color-border); font-weight: 600; color: var(--color-text);">
            Conversaciones
        </div>
        <div id="convList" class="conv-list"></div>
    </div>

    <div class="chat-col">
        <div class="thread-head">
            <div>
                <div id="threadName" style="font-weight: 700; color: var(--color-text);">Selecciona una conversación</div>
                <div id="threadMeta" class="text-xs" style="color: var(--color-text-secondary);"></div>
            </div>
            <button id="btnConvPause" type="button" class="btn-c" style="display: none;" data-paused="true">
                Bot pausado aquí
            </button>
        </div>

        <div id="thread" class="thread">
            <div class="empty-thread">Elige una conversación de la izquierda para ver el hilo.</div>
        </div>

        <form id="replyForm" class="reply-form" style="display: none;">
            <input type="text" id="replyInput" class="reply-input" maxlength="2000"
                   placeholder="Escribe tu respuesta..." autocomplete="off">
            <button type="submit" class="btn-c btn-primary-c">
                <i class="fas fa-paper-plane"></i> Enviar
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
    'use strict';
    const LIST_MS = 5000, THREAD_MS = 3000;
    let currentId = null, lastId = 0, threadTimer = null, typingSentAt = 0;

    const convList = document.getElementById('convList');
    const thread = document.getElementById('thread');
    const threadName = document.getElementById('threadName');
    const threadMeta = document.getElementById('threadMeta');
    const replyForm = document.getElementById('replyForm');
    const replyInput = document.getElementById('replyInput');
    const btnConvPause = document.getElementById('btnConvPause');
    const btnGlobalPause = document.getElementById('btnGlobalPause');
    const globalState = document.getElementById('globalState');

    function renderGlobal(paused) {
        btnGlobalPause.dataset.paused = paused ? 'true' : 'false';
        btnGlobalPause.textContent = paused ? 'Reanudar bot (global)' : 'Pausar bot (global)';
        btnGlobalPause.className = 'btn-c ' + (paused ? 'btn-ok-c' : 'btn-warn-c');
        globalState.textContent = paused ? 'Bot en pausa global — atención manual' : 'Bot activo globalmente';
    }

    function renderConvPause(paused) {
        btnConvPause.dataset.paused = paused ? 'true' : 'false';
        btnConvPause.textContent = paused ? 'Bot pausado aquí' : 'Bot activo aquí';
        btnConvPause.className = 'btn-c ' + (paused ? 'btn-ok-c' : 'btn-warn-c');
    }

    async function loadConversations() {
        try {
            const r = await fetch('/dashboard/chat/api/conversaciones');
            const data = await r.json();
            renderGlobal(data.bot_paused_global);
            convList.innerHTML = '';
            (data.conversations || []).forEach(function (c) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'conv-item' + (c.id === currentId ? ' active' : '');

                const top = document.createElement('div');
                top.className = 'conv-top';
                const name = document.createElement('span');
                name.className = 'conv-name';
                name.textContent = c.name;
                const time = document.createElement('span');
                time.className = 'conv-time';
                time.textContent = c.last_time || '';
                top.appendChild(name);
                top.appendChild(time);

                const meta = document.createElement('div');
                meta.className = 'conv-meta';
                const bot = c.bot_paused
                    ? '<span class="bot-off"><i class="fas fa-pause"></i></span>'
                    : '<span class="bot-on"><i class="fas fa-robot"></i></span>';
                meta.innerHTML = (c.is_client ? 'Cliente' : 'Anónimo')
                    + '<span class="dot-sep">·</span>' + (c.country || '--')
                    + '<span class="dot-sep">·</span>' + bot
                    + (c.unread ? ' <span class="badge-unread">' + c.unread + '</span>' : '');

                btn.appendChild(top);
                btn.appendChild(meta);
                btn.addEventListener('click', function () { openConversation(c); });
                convList.appendChild(btn);
            });
        } catch (e) { /* reintenta en el siguiente ciclo */ }
    }

    function setTyping(on) {
        let el = thread.querySelector('.t-typing');
        if (on && !el) {
            el = document.createElement('div');
            el.className = 't-row t-row--client t-typing';
            el.innerHTML = '<div class="t-bubble t-bubble--client t-dots">'
                         + '<span></span><span></span><span></span></div>';
            thread.appendChild(el);
            thread.scrollTop = thread.scrollHeight;
        } else if (!on && el) {
            el.remove();
        }
    }

    const PROOF_RE = /(\/static\/proofs\/[^\s]+)/;

    function decorateProof(bubble, body) {
        const m = (body || '').match(PROOF_RE);
        if (!m) return;
        const url = m[1];
        bubble.textContent = '📎 Comprobante enviado';
        const link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.className = 't-proof';
        if (/\.pdf$/i.test(url)) {
            link.textContent = 'Ver PDF';
        } else {
            const img = document.createElement('img');
            img.src = url;
            img.alt = 'Comprobante';
            img.className = 't-proof-img';
            link.appendChild(img);
        }
        bubble.appendChild(link);
    }

    function addMsg(m) {
        const isClient = m.sender === 'client';
        const row = document.createElement('div');
        row.className = 't-row ' + (isClient ? 't-row--client' : 't-row--staff');
        const b = document.createElement('div');
        b.className = 't-bubble t-bubble--' + m.sender;
        b.textContent = m.body;
        decorateProof(b, m.body);
        row.appendChild(b);
        const dots = thread.querySelector('.t-typing');
        if (dots) { thread.insertBefore(row, dots); } else { thread.appendChild(row); }
        if (m.id > lastId) lastId = m.id;
        thread.scrollTop = thread.scrollHeight;
    }

    async function openConversation(c) {
        currentId = c.id; lastId = 0;
        threadName.textContent = c.name;
        threadMeta.textContent = (c.is_client ? 'Cliente registrado' : 'Visitante anónimo')
                               + (c.country ? ' · ' + c.country : '');
        thread.innerHTML = '';
        replyForm.style.display = 'flex';
        btnConvPause.style.display = 'inline-block';
        renderConvPause(c.bot_paused);

        const r = await fetch('/dashboard/chat/api/' + c.id + '/mensajes');
        const data = await r.json();
        (data.messages || []).forEach(addMsg);
        setTyping(!!data.typing);
        loadConversations();
        if (threadTimer) clearInterval(threadTimer);
        threadTimer = setInterval(pollThread, THREAD_MS);
    }

    async function pollThread() {
        if (!currentId) return;
        try {
            const r = await fetch('/dashboard/chat/api/' + currentId + '/mensajes?after=' + lastId);
            const data = await r.json();
            const msgs = data.messages || [];
            if (msgs.length) { setTyping(false); msgs.forEach(addMsg); }
            setTyping(!!data.typing);
        } catch (e) { /* reintenta */ }
    }

    function notifyTyping() {
        if (!currentId) return;
        const now = Date.now();
        if (now - typingSentAt < 3000) return;
        typingSentAt = now;
        fetch('/dashboard/chat/api/' + currentId + '/typing', { method: 'POST' })
            .catch(function () {});
    }

    replyInput.addEventListener('input', notifyTyping);

    replyForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        const text = (replyInput.value || '').trim();
        if (!text || !currentId) return;
        replyInput.value = '';
        const r = await fetch('/dashboard/chat/api/' + currentId + '/responder', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ texto: text })
        });
        const data = await r.json();
        if (data.ok && data.message) addMsg(data.message);
    });

    btnConvPause.addEventListener('click', async function () {
        if (!currentId) return;
        const paused = btnConvPause.dataset.paused !== 'true';
        const r = await fetch('/dashboard/chat/api/' + currentId + '/pausa', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paused: paused })
        });
        const data = await r.json();
        if (data.ok) { renderConvPause(data.paused); loadConversations(); }
    });

    btnGlobalPause.addEventListener('click', async function () {
        const paused = btnGlobalPause.dataset.paused !== 'true';
        const r = await fetch('/dashboard/chat/api/pausa-global', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paused: paused })
        });
        const data = await r.json();
        if (data.ok) renderGlobal(data.paused);
    });

    loadConversations();
    setInterval(loadConversations, LIST_MS);
})();
</script>
{% endblock %}
